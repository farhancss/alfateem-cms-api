# Local/prod parity: API + Postgres. The public site (alfateem-web, which also hosts
# the admin at /academy-admin) is a separate app and runs independently; add it here
# if you want the whole stack under one compose file.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-academy_cms}
      POSTGRES_USER: ${POSTGRES_USER:-cms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cms_password}
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      # API waits for this before running migrations.
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cms} -d ${POSTGRES_DB:-academy_cms}']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      # Inside the compose network the DB host is the service name `db`.
      DATABASE_URL: postgresql://${POSTGRES_USER:-cms}:${POSTGRES_PASSWORD:-cms_password}@db:5432/${POSTGRES_DB:-academy_cms}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-1209600}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@alfateemacademy.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe_Strong_Passw0rd!}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Site Administrator}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      APP_URL: ${APP_URL:-http://localhost:4000}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      FRONTEND_REVALIDATE_URL: ${FRONTEND_REVALIDATE_URL:-}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-}
    ports:
      - '4000:4000'

volumes:
  db_data:
